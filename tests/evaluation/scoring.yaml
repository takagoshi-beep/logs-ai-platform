scoring:
  statuses:
    - pass
    - fail
    - warning
    - needs_clarification
    - blocked_by_validation

  dimensions:
    - intent_accuracy
    - meaning_accuracy
    - entity_resolution_accuracy
    - kpi_resolution_accuracy
    - planning_accuracy
    - capability_selection_accuracy
    - validation_accuracy
    - presentation_quality

  guidance:
    pass: All expected fields and guardrails are satisfied.
    fail: Critical mismatch, unsafe behavior, or violated guardrail.
    warning: Output is usable but has quality gaps.
    needs_clarification: Clarification is correctly requested before unsafe action.
    blocked_by_validation: Validation correctly stopped execution.
