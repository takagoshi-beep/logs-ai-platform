sales_amount:
  label: 売上金額
  type: currency
  aliases:
    - 売上
    - 売上高
    - 売上金額
    - revenue
    - sales

gross_profit:
  label: 粗利
  expression: sales_amount - cost_amount
  type: currency
  aliases:
    - 粗利
    - 粗利益

gross_margin:
  label: 粗利率
  expression: gross_profit / sales_amount
  type: percentage
  aliases:
    - 粗利率
    - 利益率

order_amount:
  label: 受注金額
  type: currency
  aliases:
    - 受注金額
    - 受注額
    - order_amount