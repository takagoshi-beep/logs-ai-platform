name: 生産管理データ同期

# 2026-07-10（14.66修正）: 以前はlogsys-chatリポジトリの「ログシス DB同期」
# 完了後にrepository_dispatchでここを呼び出す2リポジトリ構成だったが、
# logsys-chatを廃止して一本化したため、通常は sync_logsys_excel.yml の
# 中で（このワークフローを経由せず）直接呼び出される。このワークフロー
# 自体は、生産管理データだけを単独で再同期したい場合の手動実行用として
# 残している。
on:
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリをインストール
        run: |
          pip install \
            pandas \
            psycopg2-binary \
            sqlalchemy \
            google-auth \
            gspread

      - name: 生産管理データ同期を実行
        env:
          SUPABASE_DB_URL:     ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SA_KEY_JSON:  ${{ secrets.GOOGLE_SA_KEY_JSON }}
          PRODUCTION_SHEET_ID: ${{ secrets.PRODUCTION_SHEET_ID }}
        run: python scripts/sync_production_data.py